<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ArticleDotMD</title>
  <meta name="theme-color" content="#0d0d0f" id="meta-theme-color" />
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Article.MD" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=JetBrains+Mono:wght@300;400;600&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet" />
  <style id="theme-style"></style>
  <style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{display:flex;flex-direction:column;font-size:14px;background:var(--bg);color:var(--text);font-family:var(--ui-font);transition:background .3s,color .3s}

/* TOPBAR */
.topbar{display:flex;align-items:center;gap:10px;padding:0 14px;height:52px;border-bottom:1px solid var(--border);background:var(--topbar-bg);flex-shrink:0;position:relative;z-index:300;overflow:visible}
.logo{font-family:var(--display-font);font-size:18px;font-weight:900;white-space:nowrap;color:var(--logo-color);text-shadow:var(--logo-shadow,none);letter-spacing:.04em;flex-shrink:0}
.logo span{color:var(--accent)}
.topbar-divider{width:1px;height:22px;background:var(--border);flex-shrink:0}
.config-wrap{display:flex;flex-direction:column;gap:2px;flex-shrink:0}
.config-label{font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);opacity:.7}
.config-switcher{display:flex;gap:2px;background:var(--surface);border:1px solid var(--border);padding:2px;border-radius:3px}
.cfg-btn{background:transparent;border:none;font-family:var(--ui-font);font-size:10px;padding:3px 8px;cursor:pointer;color:var(--muted);border-radius:2px;transition:all .15s;white-space:nowrap;letter-spacing:.04em}
.cfg-btn:hover{color:var(--text);background:var(--border)}
.cfg-btn.active{background:var(--accent);color:var(--accent-fg);font-weight:600}
.input-group{display:flex;flex-direction:column;gap:1px;flex-shrink:0}
.input-label{font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);opacity:.65}
.meta-input{background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--muted);font-family:var(--ui-font);font-size:12px;padding:3px 5px;outline:none;width:120px;transition:border-color .2s,color .2s}
.meta-input.wide{width:150px}
.meta-input.name-field{font-family:var(--display-font);font-size:13px;width:150px}
.meta-input:focus{border-color:var(--accent);color:var(--text)}
.meta-input::placeholder{color:var(--border);font-style:italic}
.topbar-actions{display:flex;gap:5px;flex-shrink:0;margin-left:auto}
.tb-btn{background:transparent;border:1px solid var(--border);color:var(--muted);font-family:var(--ui-font);font-size:11px;padding:5px 10px;cursor:pointer;transition:all .15s;white-space:nowrap;letter-spacing:.03em;display:flex;align-items:center;gap:4px}
.tb-btn:hover{border-color:var(--accent);color:var(--accent)}
.tb-btn.primary{background:var(--accent);border-color:var(--accent);color:var(--accent-fg);font-weight:600}
.tb-btn.primary:hover{opacity:.85}
.tb-btn svg{width:13px;height:13px;flex-shrink:0}
.tb-btn.autosave-on{border-color:var(--accent);color:var(--accent)}
.tb-btn.autosave-off{opacity:.4}

/* HAMBURGER */
.hamburger{display:none;background:transparent;border:1px solid var(--border);color:var(--muted);width:34px;height:30px;cursor:pointer;align-items:center;justify-content:center;flex-shrink:0;transition:border-color .15s,color .15s;padding:0}
.hamburger:hover{border-color:var(--accent);color:var(--accent)}
.hamburger svg{width:16px;height:16px;display:block}

/* MOBILE DRAWER */
.mobile-drawer{position:absolute;top:52px;left:0;right:0;background:var(--topbar-bg);border-bottom:1px solid var(--border);flex-direction:column;gap:12px;z-index:299;backdrop-filter:blur(16px);max-height:0;overflow:hidden;transition:max-height .28s cubic-bezier(.4,0,.2,1),padding .25s,opacity .2s;opacity:0;pointer-events:none}
.mobile-drawer.open{max-height:700px;padding:14px 14px;opacity:1;pointer-events:all}
.drawer-row{display:flex;flex-wrap:wrap;gap:8px;align-items:flex-end}
.drawer-row .input-group{flex:1;min-width:100px}
.drawer-row .meta-input,.drawer-row .meta-input.wide,.drawer-row .meta-input.name-field{width:100%}
.drawer-actions{display:flex;flex-wrap:wrap;gap:5px}
.drawer-actions .tb-btn{flex:1;min-width:60px;justify-content:center}
.drawer-config .config-switcher{width:100%}
.drawer-config .cfg-btn{flex:1;text-align:center}

@media(max-width:700px){
  .hamburger{display:flex}
  .topbar-divider,.config-wrap,.topbar-actions,
  #field-articlename,#field-author,#field-publisher,
  .topbar>.input-group{display:none!important}
}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:2px;padding:4px 10px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;flex-wrap:wrap}
.fmt-btn{background:transparent;border:none;color:var(--muted);font-family:var(--ui-font);font-size:11px;padding:3px 7px;cursor:pointer;border-radius:2px;transition:background .15s,color .15s;white-space:nowrap}
.fmt-btn:hover{background:var(--border);color:var(--text)}
.sep{width:1px;height:14px;background:var(--border);margin:0 2px;flex-shrink:0}
.pane-selector{margin-left:auto;display:flex;gap:3px;align-items:center}
.pane-toggle-btn{background:transparent;border:1px solid var(--border);color:var(--muted);font-family:var(--ui-font);font-size:10px;padding:3px 7px;cursor:pointer;transition:all .15s;border-radius:2px;white-space:nowrap;user-select:none}
.pane-toggle-btn.active{background:var(--accent);border-color:var(--accent);color:var(--accent-fg);font-weight:600}
.pane-toggle-btn:not(.active):hover{border-color:var(--muted);color:var(--text)}

/* MAIN AREA */
.main-area{display:flex;flex:1;overflow:hidden;position:relative}

/* SIDEBAR */
.sidebar{display:flex;flex-direction:column;background:var(--surface);border-right:1px solid var(--border);flex-shrink:0;overflow:hidden;transition:width .28s cubic-bezier(.4,0,.2,1);width:210px;position:relative;z-index:10}
.sidebar.collapsed{width:18px}
.sidebar-toggle{position:absolute;right:-1px;top:50%;transform:translateY(-50%);width:18px;height:44px;background:var(--surface);border:1px solid var(--border);border-left:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px;z-index:11;transition:color .15s,background .15s;border-radius:0 4px 4px 0;flex-shrink:0;font-family:monospace}
.sidebar-toggle:hover{color:var(--accent);background:var(--bg)}
.sidebar-inner{display:flex;flex-direction:column;width:210px;min-width:210px;height:100%;overflow:hidden}
.sidebar-header{display:flex;gap:5px;padding:8px 8px 7px;border-bottom:1px solid var(--border);flex-shrink:0}
.sidebar-btn{flex:1;background:transparent;border:1px solid var(--border);color:var(--muted);font-family:var(--ui-font);font-size:10px;padding:5px 4px;cursor:pointer;transition:all .15s;letter-spacing:.03em;text-align:center}
.sidebar-btn:hover{border-color:var(--accent);color:var(--accent)}
.file-tree{flex:1;overflow-y:auto;padding:5px 0}
.tree-folder{user-select:none}
.folder-row{display:flex;align-items:center;gap:5px;padding:5px 8px;cursor:pointer;font-size:12px;color:var(--muted);transition:color .15s,background .15s;border-radius:2px}
.folder-row:hover{background:var(--border);color:var(--text)}
.folder-icon{font-size:9px;width:10px;text-align:center;transition:transform .15s;flex-shrink:0;display:inline-block}
.folder-row.open .folder-icon{transform:rotate(90deg)}
.folder-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:var(--ui-font)}
.folder-actions{display:none;gap:2px}
.folder-row:hover .folder-actions,.file-row:hover .file-actions{display:flex}
.tree-action-btn{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:10px;padding:1px 3px;border-radius:2px;transition:color .15s;line-height:1}
.tree-action-btn:hover{color:var(--accent)}
.folder-children{overflow:hidden;max-height:0;transition:max-height .2s ease}
.folder-children.open{max-height:9999px}
.file-row{display:flex;align-items:center;gap:5px;padding:4px 8px 4px 16px;cursor:pointer;font-size:11px;color:var(--muted);transition:color .15s,background .15s;border-radius:2px;margin:1px 0}
.file-row:hover{background:var(--border);color:var(--text)}
.file-row.active{color:var(--accent);border-left:2px solid var(--accent);padding-left:14px}
.file-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:var(--ui-font)}
.file-actions{display:none;gap:2px}
/* root-level files get less indent */
.file-tree > .file-row{padding-left:10px}
.file-tree > .file-row.active{padding-left:8px}

@media(max-width:700px){
  .sidebar{position:absolute;top:0;left:0;bottom:0;z-index:50;box-shadow:4px 0 20px rgba(0,0,0,.4)}
  .sidebar.collapsed{width:0;border-right:none}
  .sidebar-toggle{right:-26px;width:26px;height:40px;border:1px solid var(--border);border-radius:0 6px 6px 0}
  .sidebar.collapsed .sidebar-toggle{right:-26px}
}

/* PANES */
.panes-container{display:flex;flex:1;overflow:hidden;position:relative}
.pane{display:flex;flex-direction:column;overflow:hidden;min-width:80px;position:relative}
.pane+.pane{border-left:1px solid var(--border)}
.pane.hidden{display:none}
.pane-header{display:flex;align-items:center;padding:5px 14px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;cursor:grab;user-select:none}
.pane-header:active{cursor:grabbing}
.pane-header-title{font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:6px}
.pane-header-title::before{content:'';width:5px;height:5px;background:var(--accent);display:inline-block;flex-shrink:0}
.resize-handle{width:4px;background:transparent;cursor:col-resize;flex-shrink:0;position:absolute;right:-2px;top:0;bottom:0;z-index:20;transition:background .15s}
.resize-handle:hover,.resize-handle.dragging{background:var(--accent)}

#editor{flex:1;background:transparent;border:none;color:var(--text);font-family:var(--ui-font);font-size:14px;line-height:1.8;padding:20px 22px;resize:none;outline:none;overflow-y:auto;tab-size:2}
#editor::placeholder{color:var(--border)}
#notes{flex:1;background:transparent;border:none;color:var(--text);font-family:var(--ui-font);font-size:13px;line-height:1.7;padding:20px 22px;resize:none;outline:none;overflow-y:auto;opacity:.8}
#notes::placeholder{color:var(--border)}
#preview{flex:1;overflow-y:auto;padding:22px 30px;line-height:1.75;background:var(--preview-bg,var(--bg));outline:none}

/* STATUSBAR */
.statusbar{height:24px;border-top:1px solid var(--border);background:var(--surface);display:flex;align-items:center;padding:0 14px;gap:16px;flex-shrink:0}
.st{font-size:10px;color:var(--muted);font-family:var(--ui-font)}
.st b{color:var(--text);font-weight:400}

/* TOAST */
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--accent);color:var(--accent-fg);font-size:11px;font-weight:600;font-family:var(--ui-font);padding:6px 16px;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:1000;letter-spacing:.04em}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .18s;backdrop-filter:blur(4px)}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border:1px solid var(--border);padding:20px 22px;min-width:260px;max-width:360px;width:90%;animation:modal-in .18s ease}
@keyframes modal-in{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.modal-title{font-family:var(--display-font);font-size:15px;font-weight:700;color:var(--text);margin-bottom:12px}
.modal-input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:var(--ui-font);font-size:13px;padding:7px 9px;outline:none;transition:border-color .2s;margin-bottom:12px}
.modal-input:focus{border-color:var(--accent)}
.modal-btns{display:flex;gap:7px;justify-content:flex-end;flex-wrap:wrap}
.modal-btn{background:transparent;border:1px solid var(--border);color:var(--muted);font-family:var(--ui-font);font-size:11px;padding:5px 12px;cursor:pointer;transition:all .15s}
.modal-btn:hover{border-color:var(--accent);color:var(--accent)}
.modal-btn.confirm{background:var(--accent);border-color:var(--accent);color:var(--accent-fg);font-weight:600}
.modal-btn.confirm:hover{opacity:.85}

#file-upload{display:none}
.meta-hidden{display:none!important}
  </style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo" id="logo-text">Article<span>.MD</span></div>
  <div class="topbar-divider"></div>
  <div class="config-wrap">
    <div class="config-label">Configuration</div>
    <div class="config-switcher">
      <button class="cfg-btn active" id="cfg-md"   onclick="setConfig('markdown')">Markdown</button>
      <button class="cfg-btn"        id="cfg-yd"   onclick="setConfig('yellowdot')">YellowDot</button>
      <button class="cfg-btn"        id="cfg-bmcn" onclick="setConfig('bmcn')">BMCN</button>
    </div>
  </div>
  <div class="topbar-divider"></div>
  <div class="input-group" id="field-articlename">
    <div class="input-label">Article Name</div>
    <input class="meta-input name-field" id="articlename" placeholder="Untitled Article" spellcheck="false"/>
  </div>
  <div class="input-group" id="field-author">
    <div class="input-label">Author</div>
    <input class="meta-input" id="author" placeholder="Your name" spellcheck="false"/>
  </div>
  <div class="input-group" id="field-publisher">
    <div class="input-label">Publisher</div>
    <input class="meta-input" id="publisher" placeholder="Same as author" spellcheck="false"/>
  </div>
  <div class="input-group">
    <div class="input-label">Filename</div>
    <input class="meta-input wide" id="filename" value="untitled.md" spellcheck="false"/>
  </div>
  <div class="topbar-actions">
    <button class="tb-btn autosave-on" id="btn-autosave" onclick="toggleAutosave()" title="Toggle autosave">
      <svg viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M2 2h7l3 3v7H2V2z" stroke="currentColor" stroke-width="1.2"/><rect x="4.5" y="2" width="3.5" height="3" rx=".4" fill="currentColor" opacity=".5"/><rect x="3.5" y="8" width="7" height="4" rx=".4" stroke="currentColor" stroke-width="1"/></svg>
    </button>
    <button class="tb-btn" onclick="saveToLibrary()" title="Save to library">Save</button>
    <button class="tb-btn" onclick="downloadFile()" title="Download">
      <svg viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M7 1.5v7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><path d="M4 6l3 3 3-3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 11.5h10" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
    </button>
    <button class="tb-btn" onclick="document.getElementById('file-upload').click()">Upload</button>
    <button class="tb-btn primary" onclick="copyClipboard()">Copy</button>
  </div>
  <button class="hamburger" id="hamburger-btn" onclick="toggleDrawer()" aria-label="Menu">
    <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="1" y="3.5" width="14" height="1.5" rx=".75" fill="currentColor"/><rect x="1" y="7.25" width="14" height="1.5" rx=".75" fill="currentColor"/><rect x="1" y="11" width="14" height="1.5" rx=".75" fill="currentColor"/></svg>
  </button>
  <input type="file" id="file-upload" accept=".md,.txt,.markdown" onchange="uploadFile(event)"/>

  <!-- Mobile drawer -->
  <div class="mobile-drawer" id="mobile-drawer">
    <div class="drawer-row drawer-config">
      <div class="config-wrap" style="width:100%">
        <div class="config-label">Configuration</div>
        <div class="config-switcher">
          <button class="cfg-btn" id="cfg-md-m"   onclick="setConfig('markdown');closeDrawer()">Markdown</button>
          <button class="cfg-btn" id="cfg-yd-m"   onclick="setConfig('yellowdot');closeDrawer()">YellowDot</button>
          <button class="cfg-btn" id="cfg-bmcn-m" onclick="setConfig('bmcn');closeDrawer()">BMCN</button>
        </div>
      </div>
    </div>
    <div class="drawer-row" id="drawer-meta-row">
      <div class="input-group" id="drawer-field-articlename">
        <div class="input-label">Article Name</div>
        <input class="meta-input name-field" id="articlename-m" placeholder="Untitled Article" spellcheck="false"/>
      </div>
      <div class="input-group" id="drawer-field-author">
        <div class="input-label">Author</div>
        <input class="meta-input" id="author-m" placeholder="Your name" spellcheck="false"/>
      </div>
      <div class="input-group" id="drawer-field-publisher">
        <div class="input-label">Publisher</div>
        <input class="meta-input" id="publisher-m" placeholder="Same as author" spellcheck="false"/>
      </div>
      <div class="input-group">
        <div class="input-label">Filename</div>
        <input class="meta-input" id="filename-m" value="untitled.md" spellcheck="false"/>
      </div>
    </div>
    <div class="drawer-actions">
      <button class="tb-btn" onclick="toggleAutosave()"><svg viewBox="0 0 14 14" fill="none" style="width:12px;height:12px"><path d="M2 2h7l3 3v7H2V2z" stroke="currentColor" stroke-width="1.2"/><rect x="4.5" y="2" width="3.5" height="3" rx=".4" fill="currentColor" opacity=".5"/><rect x="3.5" y="8" width="7" height="4" rx=".4" stroke="currentColor" stroke-width="1"/></svg> Auto</button>
      <button class="tb-btn" onclick="saveToLibrary();closeDrawer()">Save</button>
      <button class="tb-btn" onclick="downloadFile()"><svg viewBox="0 0 14 14" fill="none" style="width:12px;height:12px"><path d="M7 1.5v7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><path d="M4 6l3 3 3-3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 11.5h10" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg></button>
      <button class="tb-btn" onclick="document.getElementById('file-upload').click();closeDrawer()">Upload</button>
      <button class="tb-btn primary" onclick="copyClipboard()">Copy</button>
    </div>
  </div>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <button class="fmt-btn" onclick="fmt('bold')"><b>B</b></button>
  <button class="fmt-btn" onclick="fmt('italic')"><i>I</i></button>
  <button class="fmt-btn" onclick="fmt('strike')">S̶</button>
  <button class="fmt-btn" onclick="fmt('code')">`</button>
  <div class="sep"></div>
  <button class="fmt-btn" onclick="fmt('h1')">H1</button>
  <button class="fmt-btn" onclick="fmt('h2')">H2</button>
  <button class="fmt-btn" onclick="fmt('h3')">H3</button>
  <div class="sep"></div>
  <button class="fmt-btn" onclick="fmt('ul')">• List</button>
  <button class="fmt-btn" onclick="fmt('ol')">1. List</button>
  <button class="fmt-btn" onclick="fmt('blockquote')">❝</button>
  <button class="fmt-btn" onclick="fmt('hr')">—</button>
  <div class="sep"></div>
  <button class="fmt-btn" onclick="fmt('link')">Link</button>
  <button class="fmt-btn" onclick="fmt('image')">Img</button>
  <button class="fmt-btn" onclick="fmt('codeblock')">```</button>
  <button class="fmt-btn" onclick="fmt('table')">Table</button>
  <div class="pane-selector">
    <button class="pane-toggle-btn active" data-pane="edit"    onclick="togglePane('edit')">Edit</button>
    <button class="pane-toggle-btn"        data-pane="notes"   onclick="togglePane('notes')">Notes</button>
    <button class="pane-toggle-btn"        data-pane="preview" onclick="togglePane('preview')">Preview</button>
  </div>
</div>

<!-- MAIN AREA -->
<div class="main-area">
  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-toggle" id="sidebar-toggle" onclick="toggleSidebar()">&#x2039;</div>
    <div class="sidebar-inner">
      <div class="sidebar-header">
        <button class="sidebar-btn" onclick="showModal('folder')">+ Folder</button>
        <button class="sidebar-btn" onclick="showModal('file')">+ File</button>
      </div>
      <div class="file-tree" id="file-tree"></div>
    </div>
  </div>

  <!-- PANES -->
  <div class="panes-container" id="panes-container">
    <div class="pane" id="pane-edit" data-pane="edit" style="flex:1">
      <div class="pane-header" draggable="true" data-pane="edit">
        <div class="pane-header-title">Edit</div>
      </div>
      <textarea id="editor" spellcheck="true" placeholder="# Start writing...&#10;&#10;Your article goes here."></textarea>
      <div class="resize-handle" data-pane="edit"></div>
    </div>
    <div class="pane hidden" id="pane-notes" data-pane="notes" style="flex:1">
      <div class="pane-header" draggable="true" data-pane="notes">
        <div class="pane-header-title">Notes</div>
      </div>
      <textarea id="notes" spellcheck="true" placeholder="Private scratchpad — never exported."></textarea>
      <div class="resize-handle" data-pane="notes"></div>
    </div>

// ─── STATE ─────────────────────────────────────────────────────────
let currentConfig  = localStorage.getItem('amd-config')    || 'markdown';
let autosave       = localStorage.getItem('amd-autosave')  !== 'false';
let autosaveTimer  = null;
let currentFileId  = null;
let activePanes    = JSON.parse(localStorage.getItem('amd-panes') || '["edit"]');
let sidebarOpen    = localStorage.getItem('amd-sidebar')   !== 'false';
let _previewEditing= false;
let _modalMode     = '';
let _modalExtra    = null;
let db;

const editor  = document.getElementById('editor');
const notesEl = document.getElementById('notes');
const preview = document.getElementById('preview');

// ─── INDEXEDDB ─────────────────────────────────────────────────────
function openDB(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open('articlemd',2);
    req.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains('files')){
        const fs=d.createObjectStore('files',{keyPath:'id',autoIncrement:true});
        fs.createIndex('folderId','folderId',{unique:false});
      }
      if(!d.objectStoreNames.contains('folders'))
        d.createObjectStore('folders',{keyPath:'id',autoIncrement:true});
    };
    req.onsuccess=e=>{db=e.target.result;res(db);};
    req.onerror=()=>rej(req.error);
  });
}
const dbt=(s,m='readonly')=>db.transaction(s,m).objectStore(s);
const dbAll=s=>new Promise((r,j)=>{const q=dbt(s).getAll();q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error);});
const dbGet=(s,id)=>new Promise((r,j)=>{const q=dbt(s).get(id);q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error);});
const dbPut=(s,o)=>new Promise((r,j)=>{const q=dbt(s,'readwrite').put(o);q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error);});
const dbAdd=(s,o)=>new Promise((r,j)=>{const q=dbt(s,'readwrite').add(o);q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error);});
const dbDel=(s,id)=>new Promise((r,j)=>{const q=dbt(s,'readwrite').delete(id);q.onsuccess=()=>r();q.onerror=()=>j(q.error);});

// ─── FILE TREE ─────────────────────────────────────────────────────
async function renderFileTree(){
  const [folders,files]=await Promise.all([dbAll('folders'),dbAll('files')]);
  const tree=document.getElementById('file-tree');
  tree.innerHTML='';

  // ensure Imported folder
  if(!folders.find(f=>f.name==='Imported')){
    const id=await dbAdd('folders',{name:'Imported'});
    folders.push({id,name:'Imported'});
  }

  // root files
  files.filter(f=>!f.folderId).forEach(f=>tree.appendChild(makeFileRow(f)));

  // folders
  folders.forEach(folder=>{
    const fFiles=files.filter(f=>f.folderId===folder.id);
    tree.appendChild(makeFolderEl(folder,fFiles));
  });
}

function makeFolderEl(folder,files){
  const wrap=document.createElement('div');
  wrap.className='tree-folder';
  const isOpen=localStorage.getItem('amd-fo-'+folder.id)==='1';
  const row=document.createElement('div');
  row.className='folder-row'+(isOpen?' open':'');
  row.innerHTML=`<span class="folder-icon">&#x25B6;</span><span class="folder-name">${esc(folder.name)}</span><span class="folder-actions"><button class="tree-action-btn" title="Rename" onclick="renameFolder(${folder.id},event)">&#x270E;</button><button class="tree-action-btn" title="Delete" onclick="deleteFolder(${folder.id},event)">&#x2715;</button></span>`;
  const children=document.createElement('div');
  children.className='folder-children'+(isOpen?' open':'');
  files.forEach(f=>children.appendChild(makeFileRow(f)));
  row.addEventListener('click',e=>{
    if(e.target.closest('.folder-actions'))return;
    row.classList.toggle('open');
    children.classList.toggle('open');
    localStorage.setItem('amd-fo-'+folder.id,row.classList.contains('open')?'1':'0');
  });
  wrap.appendChild(row);
  wrap.appendChild(children);
  return wrap;
}

function makeFileRow(file){
  const row=document.createElement('div');
  row.className='file-row'+(file.id===currentFileId?' active':'');
  row.innerHTML=`<span class="file-name">${esc(file.name)}</span><span class="file-actions"><button class="tree-action-btn" title="Rename" onclick="renameFile(${file.id},event)">&#x270E;</button><button class="tree-action-btn" title="Delete" onclick="deleteFile(${file.id},event)">&#x2715;</button></span>`;
  row.addEventListener('click',e=>{if(!e.target.closest('.file-actions'))openFile(file.id);});
  return row;
}

// ─── OPEN / SAVE ───────────────────────────────────────────────────
async function openFile(id){
  if(currentFileId)await saveCurrentFile();
  const file=await dbGet('files',id);
  if(!file)return;
  currentFileId=id;
  editor.value=file.content||'';
  notesEl.value=file.notes||'';
  setField('articlename',file.articlename||'');
  setField('author',file.author||'');
  setField('publisher',file.publisher||'');
  setField('filename',file.name);
  if(file.config)setConfig(file.config);
  editor.dispatchEvent(new Event('input'));
  setSaveStatus('Opened');
  renderFileTree();
}

async function saveCurrentFile(){
  if(!currentFileId)return;
  const file=await dbGet('files',currentFileId);
  if(!file)return;
  file.content=editor.value;
  file.notes=notesEl.value;
  file.articlename=gf('articlename');
  file.author=gf('author');
  file.publisher=gf('publisher');
  file.config=currentConfig;
  file.updatedAt=Date.now();
  await dbPut('files',file);
  setSaveStatus('Saved '+new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}));
}

async function saveToLibrary(){
  if(!currentFileId){
    const fname=gf('filename')||'untitled.md';
    const id=await dbAdd('files',{name:fname,content:editor.value,notes:notesEl.value,articlename:gf('articlename'),author:gf('author'),publisher:gf('publisher'),config:currentConfig,folderId:null,createdAt:Date.now(),updatedAt:Date.now()});
    currentFileId=id;
    renderFileTree();
    toast('Saved to library');
  }else{await saveCurrentFile();toast('Saved');}
}

function setSaveStatus(m){document.getElementById('st-save').textContent=m;}

function scheduleAutosave(){
  if(!autosave||!currentFileId)return;
  clearTimeout(autosaveTimer);
  autosaveTimer=setTimeout(()=>saveCurrentFile(),2500);
}

function toggleAutosave(){
  autosave=!autosave;
  localStorage.setItem('amd-autosave',autosave);
  const btn=document.getElementById('btn-autosave');
  btn.classList.toggle('autosave-on',autosave);
  btn.classList.toggle('autosave-off',!autosave);
  toast('Autosave '+(autosave?'ON':'OFF'));
}

// ─── MODAL ─────────────────────────────────────────────────────────
function showModal(mode,extra){
  _modalMode=mode;_modalExtra=extra||null;
  const ov=document.getElementById('modal-overlay');
  const inp=document.getElementById('modal-input');
  const title=document.getElementById('modal-title');
  const confirm=document.getElementById('modal-confirm');
  const btns=document.getElementById('modal-btns');

  // remove extra buttons
  document.querySelectorAll('.modal-extra-btn').forEach(b=>b.remove());
  inp.style.display='';

  if(mode==='folder'){title.textContent='New Folder';inp.placeholder='Folder name…';confirm.textContent='Create';inp.value='';}
  else if(mode==='file'){title.textContent='New File';inp.placeholder='filename.md';confirm.textContent='Create';inp.value='';}
  else if(mode==='rename-folder'){title.textContent='Rename Folder';inp.placeholder='New name…';confirm.textContent='Rename';inp.value=extra.current||'';}
  else if(mode==='rename-file'){title.textContent='Rename File';inp.placeholder='New name…';confirm.textContent='Rename';inp.value=extra.current||'';}
  else if(mode==='import-conflict'){
    title.textContent='File Already Exists';
    inp.style.display='none';
    confirm.textContent='Replace';
    const kb=document.createElement('button');
    kb.className='modal-btn modal-extra-btn';kb.textContent='Keep Both';
    kb.onclick=()=>{extra.keepBoth();closeModal();};
    btns.insertBefore(kb,confirm);
  }
  ov.classList.add('open');
  setTimeout(()=>inp.focus(),80);
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}
function closeModalOutside(e){if(e.target===document.getElementById('modal-overlay'))closeModal();}
document.getElementById('modal-input').addEventListener('keydown',e=>{if(e.key==='Enter')confirmModal();if(e.key==='Escape')closeModal();});

async function confirmModal(){
  const val=document.getElementById('modal-input').value.trim();
  closeModal();
  if(_modalMode==='folder'){if(!val)return;await dbAdd('folders',{name:val});renderFileTree();}
  else if(_modalMode==='file'){
    const name=val||'untitled.md';
    if(currentFileId)await saveCurrentFile();
    const id=await dbAdd('files',{name,content:'',notes:'',articlename:'',author:'',publisher:'',config:currentConfig,folderId:null,createdAt:Date.now(),updatedAt:Date.now()});
    currentFileId=id;
    editor.value='';notesEl.value='';
    setField('filename',name);
    editor.dispatchEvent(new Event('input'));
    renderFileTree();
  }
  else if(_modalMode==='rename-folder'){if(!val)return;const f=await dbGet('folders',_modalExtra.id);f.name=val;await dbPut('folders',f);renderFileTree();}
  else if(_modalMode==='rename-file'){if(!val)return;const f=await dbGet('files',_modalExtra.id);f.name=val;await dbPut('files',f);setField('filename',val);renderFileTree();}
  else if(_modalMode==='import-conflict'){_modalExtra.replace();}
}

async function renameFolder(id,e){e.stopPropagation();const f=await dbGet('folders',id);showModal('rename-folder',{id,current:f.name});}
async function deleteFolder(id,e){
  e.stopPropagation();
  const files=await dbAll('files');
  for(const f of files.filter(f=>f.folderId===id))await dbDel('files',f.id);
  await dbDel('folders',id);
  if(files.some(f=>f.folderId===id&&f.id===currentFileId)){currentFileId=null;editor.value='';notesEl.value='';editor.dispatchEvent(new Event('input'));}
  renderFileTree();
}
async function renameFile(id,e){e.stopPropagation();const f=await dbGet('files',id);showModal('rename-file',{id,current:f.name});}
async function deleteFile(id,e){
  e.stopPropagation();
  await dbDel('files',id);
  if(id===currentFileId){currentFileId=null;editor.value='';notesEl.value='';editor.dispatchEvent(new Event('input'));}
  renderFileTree();
}

// ─── SIDEBAR ───────────────────────────────────────────────────────
function toggleSidebar(){
  const sb=document.getElementById('sidebar');
  const tog=document.getElementById('sidebar-toggle');
  sidebarOpen=!sidebarOpen;
  localStorage.setItem('amd-sidebar',sidebarOpen?'true':'false');
  sb.classList.toggle('collapsed',!sidebarOpen);
  tog.innerHTML=sidebarOpen?'&#x2039;':'&#x203A;';
}

// ─── PANES ─────────────────────────────────────────────────────────
function togglePane(name){
  const idx=activePanes.indexOf(name);
  if(idx===-1){if(activePanes.length>=3)return;activePanes.push(name);}
  else{if(activePanes.length===1)return;activePanes.splice(idx,1);}
  localStorage.setItem('amd-panes',JSON.stringify(activePanes));
  applyPanes();
}

function applyPanes(){
  const container=document.getElementById('panes-container');
  const order=['edit','notes','preview'];
  const sorted=activePanes.slice().sort((a,b)=>order.indexOf(a)-order.indexOf(b));
  sorted.forEach(name=>container.appendChild(document.getElementById('pane-'+name)));
  order.forEach(name=>{
    const pane=document.getElementById('pane-'+name);
    const btn=document.querySelector(`.pane-toggle-btn[data-pane="${name}"]`);
    const active=activePanes.includes(name);
    pane.classList.toggle('hidden',!active);
    if(btn)btn.classList.toggle('active',active);
  });
  preview.contentEditable=activePanes.includes('preview')?'true':'false';
}

// ─── DRAG REORDER ──────────────────────────────────────────────────
let dragSrc=null;
document.querySelectorAll('.pane-header').forEach(h=>{
  h.addEventListener('dragstart',e=>{dragSrc=h.dataset.pane;e.dataTransfer.effectAllowed='move';});
  h.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='move';});
  h.addEventListener('drop',e=>{
    e.preventDefault();
    const target=h.dataset.pane;
    if(!dragSrc||dragSrc===target)return;
    const ia=activePanes.indexOf(dragSrc),ib=activePanes.indexOf(target);
    if(ia===-1||ib===-1)return;
    [activePanes[ia],activePanes[ib]]=[activePanes[ib],activePanes[ia]];
    localStorage.setItem('amd-panes',JSON.stringify(activePanes));
    applyPanes();dragSrc=null;
  });
});

// ─── RESIZE ────────────────────────────────────────────────────────
(()=>{
  let active=null,startX=0,startA=0,startB=0;
  document.querySelectorAll('.resize-handle').forEach(handle=>{
    handle.addEventListener('mousedown',e=>{
      e.preventDefault();
      const paneEl=document.getElementById('pane-'+handle.dataset.pane);
      let next=paneEl.nextElementSibling;
      while(next&&next.classList.contains('hidden'))next=next.nextElementSibling;
      if(!next)return;
      active={paneEl,next,handle};startX=e.clientX;
      startA=parseFloat(getComputedStyle(paneEl).flexGrow)||1;
      startB=parseFloat(getComputedStyle(next).flexGrow)||1;
      handle.classList.add('dragging');
    });
  });
  document.addEventListener('mousemove',e=>{
    if(!active)return;
    const total=active.paneEl.parentElement.offsetWidth;
    const dx=e.clientX-startX;const ratio=dx/total;const sum=startA+startB;
    const newA=Math.max(.1,startA+ratio*sum);const newB=Math.max(.1,sum-newA);
    active.paneEl.style.flex=newA;active.next.style.flex=newB;
  });
  document.addEventListener('mouseup',()=>{if(active){active.handle.classList.remove('dragging');active=null;}});
})();

// ─── MARKDOWN RENDERER ─────────────────────────────────────────────
function renderMD(src){
  let t=src.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const blocks=[];
  t=t.replace(/```(\w*)\n?([\s\S]*?)```/gm,(_,l,code)=>{
    const raw=code.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>');
    blocks.push(`<pre><code>${escH(raw)}</code></pre>`);return`\x00B${blocks.length-1}\x00`;
  });
  t=t.replace(/^######\s(.+)$/gm,'<h6>$1</h6>').replace(/^#####\s(.+)$/gm,'<h5>$1</h5>').replace(/^####\s(.+)$/gm,'<h4>$1</h4>').replace(/^###\s(.+)$/gm,'<h3>$1</h3>').replace(/^##\s(.+)$/gm,'<h2>$1</h2>').replace(/^#\s(.+)$/gm,'<h1>$1</h1>');
  t=t.replace(/^(-{3,}|\*{3,}|_{3,})$/gm,'<hr>');
  t=t.replace(/^&gt;\s(.+)$/gm,'<blockquote>$1</blockquote>');
  t=t.replace(/^\|(.+)\|\n\|[-| :]+\|\n((?:\|.+\|\n?)+)/gm,(_,hdr,rows)=>{
    const ths=hdr.split('|').filter(Boolean).map(c=>`<th>${c.trim()}</th>`).join('');
    const trs=rows.trim().split('\n').map(r=>'<tr>'+r.split('|').filter(Boolean).map(c=>`<td>${c.trim()}</td>`).join('')+'</tr>').join('');
    return`<table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>`;
  });
  t=t.replace(/((?:^[\*\-]\s.+\n?)+)/gm,m=>'<ul>'+m.trim().split('\n').map(l=>`<li>${l.replace(/^[\*\-]\s/,'')}</li>`).join('')+'</ul>');
  t=t.replace(/((?:^\d+\.\s.+\n?)+)/gm,m=>'<ol>'+m.trim().split('\n').map(l=>`<li>${l.replace(/^\d+\.\s/,'')}</li>`).join('')+'</ol>');
  t=t.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/~~(.+?)~~/g,'<del>$1</del>').replace(/`([^`\x00]+)`/g,'<code>$1</code>');
  t=t.replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img alt="$1" src="$2">').replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>');
  t=t.split(/\n\n+/).map(b=>{b=b.trim();if(!b)return'';if(/^(\x00B|<(h[1-6]|ul|ol|pre|blockquote|hr|table))/.test(b))return b;return`<p>${b.replace(/\n/g,'<br>')}</p>`;}).join('\n');
  t=t.replace(/\x00B(\d+)\x00/g,(_,i)=>blocks[+i]);
  return t;
}
function escH(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function esc(s){return s.replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ─── PREVIEW SYNC ──────────────────────────────────────────────────
preview.addEventListener('focus',()=>_previewEditing=true);
preview.addEventListener('blur',()=>_previewEditing=false);
preview.addEventListener('input',()=>{
  if(!_previewEditing)return;
  editor.value=htmlToMD(preview.innerHTML);
  updateStats();scheduleAutosave();

function htmlToMD(h){
  return h
    .replace(/<h1[^>]*>(.*?)<\/h1>/gi,'# $1\n\n').replace(/<h2[^>]*>(.*?)<\/h2>/gi,'## $1\n\n')
    .replace(/<h3[^>]*>(.*?)<\/h3>/gi,'### $1\n\n').replace(/<h4[^>]*>(.*?)<\/h4>/gi,'#### $1\n\n')
    .replace(/<h5[^>]*>(.*?)<\/h5>/gi,'##### $1\n\n').replace(/<h6[^>]*>(.*?)<\/h6>/gi,'###### $1\n\n')
    .replace(/<strong[^>]*>(.*?)<\/strong>/gi,'**$1**').replace(/<b[^>]*>(.*?)<\/b>/gi,'**$1**')
    .replace(/<em[^>]*>(.*?)<\/em>/gi,'*$1*').replace(/<i[^>]*>(.*?)<\/i>/gi,'*$1*')
    .replace(/<del[^>]*>(.*?)<\/del>/gi,'~~$1~~').replace(/<code[^>]*>(.*?)<\/code>/gi,'`$1`')
    .replace(/<a[^>]*href="([^"]*)"[^>]*>(.*?)<\/a>/gi,'[$2]($1)')
    .replace(/<img[^>]*src="([^"]*)"[^>]*alt="([^"]*)"[^>]*\/?>/gi,'![$2]($1)')
    .replace(/<br\s*\/?>/gi,'\n').replace(/<li[^>]*>(.*?)<\/li>/gi,'- $1\n')
    .replace(/<ul[^>]*>([\s\S]*?)<\/ul>/gi,'$1\n').replace(/<ol[^>]*>([\s\S]*?)<\/ol>/gi,'$1\n')
    .replace(/<blockquote[^>]*>(.*?)<\/blockquote>/gi,'> $1\n\n').replace(/<hr[^>]*\/?>/gi,'\n---\n\n')
    .replace(/<p[^>]*>(.*?)<\/p>/gi,'$1\n\n').replace(/<pre[^>]*>[\s\S]*?<code[^>]*>([\s\S]*?)<\/code>[\s\S]*?<\/pre>/gi,'```\n$1\n```\n\n')
    .replace(/<[^>]+>/g,'').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&nbsp;/g,' ')
    .replace(/\n{3,}/g,'\n\n').trim();
}

editor.addEventListener('input',()=>{
  if(_previewEditing)return;
  preview.innerHTML=renderMD(editor.value);
  updateStats();scheduleAutosave();
});
notesEl.addEventListener('input',()=>scheduleAutosave());

function updateStats(){
  const v=editor.value,w=v.trim()?v.trim().split(/\s+/).length:0;
  document.getElementById('st-words').textContent=w;
  document.getElementById('st-chars').textContent=v.length;
  document.getElementById('st-lines').textContent=v.split('\n').length;
  document.getElementById('st-read').textContent=Math.max(1,Math.round(w/200))+' min';
}

// ─── FORMAT ────────────────────────────────────────────────────────
function fmt(type){
  const s=editor.selectionStart,e=editor.selectionEnd,sel=editor.value.substring(s,e);
  const pre=editor.value.substring(0,s),post=editor.value.substring(e);
  const wrap=(l,r)=>{editor.value=pre+l+sel+r+post;editor.setSelectionRange(s+l.length,e+l.length);};
  const lineP=(p)=>{const ls=pre.lastIndexOf('\n')+1;editor.value=editor.value.substring(0,ls)+p+editor.value.substring(ls);editor.setSelectionRange(s+p.length,e+p.length);};
  const ins=(t,c)=>{editor.value=pre+t+post;editor.setSelectionRange(s+c,s+c);};
  switch(type){
    case 'bold':wrap('**','**');break;case 'italic':wrap('*','*');break;case 'strike':wrap('~~','~~');break;
    case 'code':wrap('`','`');break;case 'h1':lineP('# ');break;case 'h2':lineP('## ');break;case 'h3':lineP('### ');break;
    case 'ul':lineP('- ');break;case 'ol':lineP('1. ');break;case 'blockquote':lineP('> ');break;
    case 'hr':ins('\n\n---\n\n',6);break;case 'link':wrap('[','](url)');break;case 'image':wrap('![','](url)');break;
    case 'codeblock':wrap('```\n','\n```');break;
    case 'table':{const tbl='\n| Column 1 | Column 2 | Column 3 |\n| --- | --- | --- |\n| Cell | Cell | Cell |\n';ins(tbl,tbl.length);break;}
  }
  editor.focus();editor.dispatchEvent(new Event('input'));
}

// ─── EXPORT ────────────────────────────────────────────────────────
function getExportContent(){
  const body=editor.value,name=gf('articlename'),author=gf('author'),publisher=gf('publisher');
  if(currentConfig==='markdown')return body;
  const lines=[];
  if(name)lines.push(`@n="${name}"`);
  if(author)lines.push(`###### Written by ${author}`);
  let c=lines.join('\n');if(c)c+='\n\n';c+=body;
  if(author){
    const date=new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
    const pub=publisher&&publisher!==author?publisher:null;
    c+=pub?`\n\n**Written by ${author}** and published by ${pub} on ${date}`:`\n\n**Written and Published by ${author}** on ${date}`;
  }
  return c;
}

function downloadFile(){
  const name=gf('filename')||'article.md';
  const blob=new Blob([getExportContent()],{type:'text/markdown'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();
  toast('Downloaded — '+name);
}

async function uploadFile(evt){
  const file=evt.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=async ev=>{
    let content=ev.target.result;
    const nm=content.match(/^@n="([^\n"]*)"\n?/);
    const am=content.match(/^###### Written by (.+)\n?/m);
    const articlename=nm?nm[1]:'';const author=am?am[1].trim():'';
    if(nm)content=content.slice(nm[0].length);
    if(am)content=content.replace(am[0],'');
    content=content.replace(/\n\n\*\*Written.*?on .+$/s,'').trimEnd();

    const folders=await dbAll('folders');
    let impFolder=folders.find(f=>f.name==='Imported');
    if(!impFolder){const id=await dbAdd('folders',{name:'Imported'});impFolder={id,name:'Imported'};}
    const files=await dbAll('files');
    const existing=files.find(f=>f.folderId===impFolder.id&&f.name===file.name&&(f.author||'')===author);

    const doImport=async(keepBoth)=>{
      let fname=file.name;
      if(keepBoth){
        let n=1;
        while(files.some(f=>f.folderId===impFolder.id&&f.name===fname)){
          const dot=file.name.lastIndexOf('.');
          fname=dot>0?file.name.slice(0,dot)+` (${n})`+file.name.slice(dot):file.name+` (${n})`;n++;
        }
        const id=await dbAdd('files',{name:fname,content,notes:'',articlename,author,publisher:'',config:currentConfig,folderId:impFolder.id,createdAt:Date.now(),updatedAt:Date.now()});
        await openFile(id);
      }else{
        existing.content=content;existing.articlename=articlename;existing.author=author;existing.updatedAt=Date.now();
        await dbPut('files',existing);await openFile(existing.id);
      }
      renderFileTree();toast('Imported — '+fname);
    };

    if(existing){_modalExtra={replace:()=>doImport(false),keepBoth:()=>doImport(true)};showModal('import-conflict');}
    else{const id=await dbAdd('files',{name:file.name,content,notes:'',articlename,author,publisher:'',config:currentConfig,folderId:impFolder.id,createdAt:Date.now(),updatedAt:Date.now()});await openFile(id);renderFileTree();toast('Imported — '+file.name);}
  };
  r.readAsText(file);evt.target.value='';
}

function copyClipboard(){navigator.clipboard.writeText(getExportContent()).then(()=>toast('Copied to clipboard'));}

// ─── THEME / CONFIG ────────────────────────────────────────────────
function setConfig(name){
  currentConfig=name;localStorage.setItem('amd-config',name);
  const theme=THEMES[name];
  document.getElementById('theme-style').textContent=`:root{${theme.vars}}\n`+theme.previewCSS;
  document.getElementById('logo-text').innerHTML=theme.logoHTML;
  ['md','yd','bmcn'].forEach(k=>{const map={md:'markdown',yd:'yellowdot',bmcn:'bmcn'};document.getElementById('cfg-'+k).classList.toggle('active',map[k]===name);});
  ['md-m','yd-m','bmcn-m'].forEach(k=>{const map={'md-m':'markdown','yd-m':'yellowdot','bmcn-m':'bmcn'};const btn=document.getElementById('cfg-'+k);if(btn)btn.classList.toggle('active',map[k]===name);});
  const isMD=name==='markdown';
  ['field-articlename','field-author','field-publisher'].forEach(id=>document.getElementById(id).classList.toggle('meta-hidden',isMD));
  ['drawer-field-articlename','drawer-field-author','drawer-field-publisher'].forEach(id=>document.getElementById(id).classList.toggle('meta-hidden',isMD));
  document.getElementById('st-mode').textContent={markdown:'Markdown',yellowdot:'YellowDot',bmcn:'BMCN'}[name];
  document.getElementById('meta-theme-color').setAttribute('content',name==='yellowdot'?'#0D0A00':name==='bmcn'?'#040D18':'#0d0d0f');
  editor.dispatchEvent(new Event('input'));
}

function toast(msg){

});
