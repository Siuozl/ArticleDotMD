<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ArticleDotMD</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=JetBrains+Mono:wght@300;400;600&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet" />
  <style id="theme-style"></style>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    /* ── BASE SHELL (theme-agnostic layout) ── */
    body {
      display: flex;
      flex-direction: column;
      font-size: 14px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--ui-font);
      transition: background 0.3s, color 0.3s;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 20px;
      height: 54px;
      border-bottom: 1px solid var(--border);
      background: var(--topbar-bg);
      flex-shrink: 0;
      position: relative;
      z-index: 200;
      overflow: visible;
    }

    /* ── HAMBURGER + DRAWER ── */
    .hamburger {
      display: none;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      width: 34px; height: 30px;
      cursor: pointer;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: border-color 0.15s, color 0.15s;
      padding: 0;
      margin-left: auto;
    }
    .hamburger:hover { border-color: var(--accent); color: var(--accent); }
    .hamburger svg { width: 16px; height: 16px; display: block; }

    .mobile-drawer {
      display: none;
      position: absolute;
      top: 54px; left: 0; right: 0;
      background: var(--topbar-bg);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px;
      flex-direction: column;
      gap: 14px;
      z-index: 199;
      backdrop-filter: blur(16px);
      animation: drawer-in 0.18s ease;
    }
    .mobile-drawer.open { display: flex; }
    @keyframes drawer-in {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .drawer-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: flex-end;
    }
    .drawer-row .input-group { flex: 1; min-width: 110px; }
    .drawer-row .meta-input,
    .drawer-row .meta-input.wide,
    .drawer-row .meta-input.name-field { width: 100%; }

    .drawer-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .drawer-actions .tb-btn { flex: 1; min-width: 80px; text-align: center; font-size: 11px; }

    .drawer-config .config-switcher { width: 100%; }
    .drawer-config .cfg-btn { flex: 1; text-align: center; }

    @media (max-width: 700px) {
      .hamburger { display: flex; }
      .topbar-divider,
      .config-wrap,
      .topbar-actions,
      #field-articlename,
      #field-author,
      #field-publisher,
      .topbar > .input-group { display: none !important; }
    }

    .logo {
      font-family: var(--display-font);
      font-size: 19px;
      font-weight: 900;
      white-space: nowrap;
      color: var(--logo-color);
      text-shadow: var(--logo-shadow, none);
      letter-spacing: 0.04em;
    }
    .logo span { color: var(--accent); }

    .topbar-divider { width: 1px; height: 24px; background: var(--border); flex-shrink: 0; }

    /* Config switcher */
    .config-wrap {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .config-label {
      font-size: 8px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0.7;
    }
    .config-switcher {
      display: flex;
      gap: 2px;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 2px;
      border-radius: 3px;
    }
    .cfg-btn {
      background: transparent;
      border: none;
      font-family: var(--ui-font);
      font-size: 10px;
      padding: 3px 9px;
      cursor: pointer;
      color: var(--muted);
      border-radius: 2px;
      transition: all 0.15s;
      white-space: nowrap;
      letter-spacing: 0.04em;
    }
    .cfg-btn:hover { color: var(--text); background: var(--border); }
    .cfg-btn.active {
      background: var(--accent);
      color: var(--accent-fg);
      font-weight: 600;
    }

    /* Input groups */
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .input-label {
      font-size: 8px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0.65;
    }
    .meta-input {
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--ui-font);
      font-size: 12px;
      padding: 3px 5px;
      outline: none;
      width: 140px;
      transition: border-color 0.2s, color 0.2s;
    }
    .meta-input.wide { width: 180px; }
    .meta-input.name-field {
      font-family: var(--display-font);
      font-size: 13px;
      width: 180px;
    }
    .meta-input:focus { border-color: var(--accent); color: var(--text); }
    .meta-input::placeholder { color: var(--border); font-style: italic; }

    .topbar-actions { display: flex; gap: 6px; margin-left: auto; }

    .tb-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--ui-font);
      font-size: 11px;
      padding: 6px 13px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      letter-spacing: 0.03em;
    }
    .tb-btn:hover { border-color: var(--accent); color: var(--accent); }
    .tb-btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--accent-fg);
      font-weight: 600;
    }
    .tb-btn.primary:hover { opacity: 0.85; }

    /* Formatting toolbar */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 2px;
      padding: 5px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .fmt-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      font-family: var(--ui-font);
      font-size: 11px;
      padding: 4px 9px;
      cursor: pointer;
      border-radius: 2px;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .fmt-btn:hover { background: var(--border); color: var(--text); }
    .sep { width: 1px; height: 16px; background: var(--border); margin: 0 3px; flex-shrink: 0; }

    .view-toggle { margin-left: auto; display: flex; gap: 2px; }
    .view-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--ui-font);
      font-size: 10px;
      padding: 3px 9px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .view-btn.active { background: var(--border); color: var(--text); }
    .view-btn:hover:not(.active) { border-color: var(--muted); color: var(--text); }

    /* Editor area */
    .editor-area { display: flex; flex: 1; overflow: hidden; }
    .pane { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .pane + .pane { border-left: 1px solid var(--border); }
    .pane.hidden { display: none; }

    .pane-label {
      font-size: 9px;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 6px 18px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .pane-label::before {
      content: '';
      width: 5px; height: 5px;
      background: var(--accent);
      display: inline-block;
      flex-shrink: 0;
    }

    #editor {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      font-family: var(--ui-font);
      font-size: 14px;
      line-height: 1.8;
      padding: 28px;
      resize: none;
      outline: none;
      overflow-y: auto;
      tab-size: 2;
    }
    #editor::placeholder { color: var(--border); }

    #preview {
      flex: 1;
      overflow-y: auto;
      padding: 32px 40px;
      line-height: 1.75;
      background: var(--preview-bg, var(--bg));
    }

    /* Status bar */
    .statusbar {
      height: 24px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      padding: 0 18px;
      gap: 20px;
      flex-shrink: 0;
    }
    .st { font-size: 10px; color: var(--muted); font-family: var(--ui-font); }
    .st b { color: var(--text); font-weight: 400; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 32px; left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: var(--accent);
      color: var(--accent-fg);
      font-size: 11px; font-weight: 600;
      font-family: var(--ui-font);
      padding: 7px 18px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 1000;
      letter-spacing: 0.04em;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    #file-upload { display: none; }

    /* hidden meta fields controlled by JS */
    .meta-hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="logo" id="logo-text">Article<span>.MD</span></div>
    <div class="topbar-divider"></div>

    <!-- Config switcher (desktop) -->
    <div class="config-wrap">
      <div class="config-label">Configuration</div>
      <div class="config-switcher" id="cfg-switcher-desktop">
        <button class="cfg-btn active" id="cfg-md"   onclick="setConfig('markdown')">Markdown</button>
        <button class="cfg-btn"        id="cfg-yd"   onclick="setConfig('yellowdot')">YellowDot</button>
        <button class="cfg-btn"        id="cfg-bmcn" onclick="setConfig('bmcn')">BMCN</button>
      </div>
    </div>

    <div class="topbar-divider"></div>

    <!-- Article name (hidden in Markdown mode) -->
    <div class="input-group" id="field-articlename">
      <div class="input-label">Article Name</div>
      <input class="meta-input name-field" id="articlename" placeholder="Untitled Article" spellcheck="false" />
    </div>

    <!-- Author -->
    <div class="input-group" id="field-author">
      <div class="input-label">Author</div>
      <input class="meta-input" id="author" placeholder="Your name" spellcheck="false" />
    </div>

    <!-- Publisher -->
    <div class="input-group" id="field-publisher">
      <div class="input-label">Publisher</div>
      <input class="meta-input" id="publisher" placeholder="Same as author" spellcheck="false" />
    </div>

    <!-- Filename -->
    <div class="input-group">
      <div class="input-label">Filename</div>
      <input class="meta-input wide" id="filename" value="untitled.md" spellcheck="false" />
    </div>

    <div class="topbar-actions">
      <button class="tb-btn" onclick="newFile()">New File</button>
      <button class="tb-btn" onclick="document.getElementById('file-upload').click()">Upload</button>
      <button class="tb-btn" onclick="saveFile()">Save</button>
      <button class="tb-btn primary" onclick="copyClipboard()">Copy to Clipboard</button>
    </div>

    <!-- Hamburger (mobile only) -->
    <button class="hamburger" id="hamburger-btn" onclick="toggleDrawer()" aria-label="Menu">
      <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="3.5" width="14" height="1.5" rx="0.75" fill="currentColor"/>
        <rect x="1" y="7.25" width="14" height="1.5" rx="0.75" fill="currentColor"/>
        <rect x="1" y="11" width="14" height="1.5" rx="0.75" fill="currentColor"/>
      </svg>
    </button>

    <input type="file" id="file-upload" accept=".md,.txt,.markdown" onchange="uploadFile(event)" />

    <!-- Mobile drawer -->
    <div class="mobile-drawer" id="mobile-drawer">

      <!-- Config row -->
      <div class="drawer-row drawer-config">
        <div class="config-wrap" style="width:100%">
          <div class="config-label">Configuration</div>
          <div class="config-switcher" id="cfg-switcher-mobile">
            <button class="cfg-btn" id="cfg-md-m"   onclick="setConfig('markdown');closeDrawer()">Markdown</button>
            <button class="cfg-btn" id="cfg-yd-m"   onclick="setConfig('yellowdot');closeDrawer()">YellowDot</button>
            <button class="cfg-btn" id="cfg-bmcn-m" onclick="setConfig('bmcn');closeDrawer()">BMCN</button>
          </div>
        </div>
      </div>

      <!-- Meta fields row (shown/hidden by config) -->
      <div class="drawer-row" id="drawer-meta-row">
        <div class="input-group" id="drawer-field-articlename">
          <div class="input-label">Article Name</div>
          <input class="meta-input name-field" id="articlename-m" placeholder="Untitled Article" spellcheck="false" />
        </div>
        <div class="input-group" id="drawer-field-author">
          <div class="input-label">Author</div>
          <input class="meta-input" id="author-m" placeholder="Your name" spellcheck="false" />
        </div>
        <div class="input-group" id="drawer-field-publisher">
          <div class="input-label">Publisher</div>
          <input class="meta-input" id="publisher-m" placeholder="Same as author" spellcheck="false" />
        </div>
        <div class="input-group">
          <div class="input-label">Filename</div>
          <input class="meta-input" id="filename-m" value="untitled.md" spellcheck="false" />
        </div>
      </div>

      <!-- Action buttons -->
      <div class="drawer-actions">
        <button class="tb-btn" onclick="newFile();closeDrawer()">New File</button>
        <button class="tb-btn" onclick="document.getElementById('file-upload').click();closeDrawer()">Upload</button>
        <button class="tb-btn" onclick="saveFile()">Save</button>
        <button class="tb-btn primary" onclick="copyClipboard()">Copy</button>
      </div>

    </div>
  </div>

  <!-- FORMATTING TOOLBAR -->
  <div class="toolbar">
    <button class="fmt-btn" onclick="fmt('bold')"><b>B</b></button>
    <button class="fmt-btn" onclick="fmt('italic')"><i>I</i></button>
    <button class="fmt-btn" onclick="fmt('strike')">S̶</button>
    <button class="fmt-btn" onclick="fmt('code')">`code`</button>
    <div class="sep"></div>
    <button class="fmt-btn" onclick="fmt('h1')">H1</button>
    <button class="fmt-btn" onclick="fmt('h2')">H2</button>
    <button class="fmt-btn" onclick="fmt('h3')">H3</button>
    <div class="sep"></div>
    <button class="fmt-btn" onclick="fmt('ul')">• List</button>
    <button class="fmt-btn" onclick="fmt('ol')">1. List</button>
    <button class="fmt-btn" onclick="fmt('blockquote')">❝ Quote</button>
    <button class="fmt-btn" onclick="fmt('hr')">— HR</button>
    <div class="sep"></div>
    <button class="fmt-btn" onclick="fmt('link')">Link</button>
    <button class="fmt-btn" onclick="fmt('image')">Image</button>
    <button class="fmt-btn" onclick="fmt('codeblock')">Code Block</button>
    <button class="fmt-btn" onclick="fmt('table')">Table</button>
    <div class="view-toggle">
      <button class="view-btn active" id="vb-split"   onclick="setView('split')">Split</button>
      <button class="view-btn"        id="vb-edit"    onclick="setView('edit')">Edit</button>
      <button class="view-btn"        id="vb-preview" onclick="setView('preview')">Preview</button>
    </div>
  </div>

  <!-- EDITOR -->
  <div class="editor-area">
    <div class="pane" id="pane-edit">
      <div class="pane-label">Markdown</div>
      <textarea id="editor" spellcheck="true" placeholder="# Start writing...&#10;&#10;Your article goes here."></textarea>
    </div>
    <div class="pane" id="pane-preview">
      <div class="pane-label">Preview</div>
      <div id="preview"></div>
    </div>
  </div>

  <div class="statusbar">
    <div class="st">Words: <b id="st-words">0</b></div>
    <div class="st">Chars: <b id="st-chars">0</b></div>
    <div class="st">Lines: <b id="st-lines">0</b></div>
    <div class="st">Read: <b id="st-read">0 min</b></div>
    <div class="st" id="st-config" style="margin-left:auto;">Mode: <b id="st-mode">Markdown</b></div>
  </div>

  <div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════════
//  THEME DEFINITIONS
// ══════════════════════════════════════════════════════

const THEMES = {

  markdown: {
    vars: `
      --bg: #0d0d0f;
      --surface: #14141a;
      --border: #232330;
      --accent: #c8f064;
      --accent-fg: #0d0d0f;
      --accent2: #64d4f0;
      --text: #e8e8f0;
      --muted: #6a6a80;
      --topbar-bg: rgba(13,13,15,0.97);
      --logo-color: #e8e8f0;
      --display-font: 'Playfair Display', serif;
      --ui-font: 'JetBrains Mono', monospace;
      --preview-bg: #0d0d0f;
    `,
    logoHTML: 'Article<span>.MD</span>',
    previewCSS: `
      #preview { font-family: 'JetBrains Mono', monospace; font-size: 14px; color: #e8e8f0; }
      #preview h1 { font-family: 'Playfair Display', serif; font-size: 36px; font-weight: 900; color: #e8e8f0; margin: 0 0 18px; line-height: 1.1; letter-spacing: -0.5px; }
      #preview h2 { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; color: #e8e8f0; margin: 32px 0 10px; padding-bottom: 7px; border-bottom: 1px solid #232330; }
      #preview h3 { font-family: 'Playfair Display', serif; font-size: 19px; font-weight: 700; color: #e8e8f0; margin: 24px 0 8px; }
      #preview h4, #preview h5, #preview h6 { font-family: 'Playfair Display', serif; font-size: 15px; color: #64d4f0; margin: 18px 0 5px; }
      #preview p { color: #6a6a80; margin-bottom: 13px; }
      #preview strong { color: #e8e8f0; }
      #preview em { color: #64d4f0; font-style: italic; }
      #preview del { color: #6a6a80; text-decoration: line-through; }
      #preview a { color: #c8f064; text-decoration: underline; }
      #preview code { background: #1e1e28; color: #c8f064; padding: 2px 5px; font-family: 'JetBrains Mono', monospace; font-size: 12px; border-radius: 2px; }
      #preview pre { background: #1e1e28; border: 1px solid #232330; padding: 18px; overflow-x: auto; margin-bottom: 14px; }
      #preview pre code { background: none; padding: 0; color: #64d4f0; }
      #preview blockquote { border-left: 3px solid #c8f064; padding: 4px 18px; margin: 14px 0; color: #6a6a80; font-style: italic; }
      #preview ul, #preview ol { padding-left: 22px; margin-bottom: 13px; color: #6a6a80; }
      #preview li { margin-bottom: 3px; }
      #preview hr { border: none; border-top: 1px solid #232330; margin: 26px 0; }
      #preview table { width: 100%; border-collapse: collapse; margin-bottom: 14px; font-size: 13px; }
      #preview th { background: #14141a; color: #e8e8f0; padding: 7px 12px; text-align: left; border: 1px solid #232330; font-weight: 600; }
      #preview td { padding: 7px 12px; border: 1px solid #232330; color: #6a6a80; }
      #preview img { max-width: 100%; }
    `
  },

  yellowdot: {
    vars: `
      --bg: #0D0A00;
      --surface: #110D00;
      --border: #2a1f00;
      --accent: #F5C518;
      --accent-fg: #0D0A00;
      --accent2: #FFF4B2;
      --text: #FFFBE6;
      --muted: #B8860B;
      --topbar-bg: rgba(13,10,0,0.97);
      --logo-color: #F5C518;
      --logo-shadow: 0 0 12px #FFD700AA, 0 0 30px #F5C51866;
      --display-font: 'Playfair Display', serif;
      --ui-font: 'DM Mono', monospace;
      --preview-bg: #0D0A00;
    `,
    logoHTML: 'Yellow<span>Dot</span>',
    previewCSS: `
      #preview { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 19px; color: #FFFBE6; line-height: 1.75; }
      #preview h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.2rem, 5vw, 3.2rem); font-weight: 900; font-style: italic; line-height: 1.15; color: #FFD700; text-shadow: 0 0 12px #FFD700AA, 0 0 30px #F5C51866; margin: 2rem 0 1.2rem; letter-spacing: -0.01em; }
      #preview h1::after { content: ''; display: block; margin-top: 10px; height: 2px; background: linear-gradient(to right, #FFD700, #B8860B, transparent); box-shadow: 0 0 10px #F5C518; }
      #preview h2 { font-family: 'Playfair Display', serif; font-size: clamp(1.5rem, 3vw, 2rem); font-weight: 700; color: #F5C518; text-shadow: 0 0 8px #FFD70088, 0 0 18px #F5C51844; margin: 2.5rem 0 1rem; position: relative; padding-left: 20px; }
      #preview h2::before { content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%); width: 5px; height: 70%; background: linear-gradient(to bottom, #FFD700, #B8860B); box-shadow: 0 0 8px #FFD70088; border-radius: 3px; }
      #preview h3 { font-family: 'Playfair Display', serif; font-size: clamp(1.1rem, 2vw, 1.4rem); font-weight: 700; font-style: italic; color: #FFF4B2; margin: 2rem 0 0.8rem; }
      #preview h4, #preview h5, #preview h6 { font-family: 'DM Mono', monospace; font-size: 0.85rem; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: #B8860B; margin: 1.5rem 0 0.6rem; }
      #preview p { color: #FFF7D0; margin-bottom: 1.3rem; font-size: 1.05rem; font-weight: 300; }
      #preview strong { font-weight: 700; color: #FFD700; text-shadow: 0 0 12px #FFD70055; }
      #preview em { font-style: italic; color: #FFF4B2; }
      #preview del { color: #B8860B; text-decoration: line-through; }
      #preview a { color: #FFD700; text-decoration: none; border-bottom: 1px solid #FFD70055; transition: color 0.2s; }

// ══════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════
let currentConfig = localStorage.getItem('articlemd-config') || 'markdown';
const editor  = document.getElementById('editor');
const preview = document.getElementById('preview');

// ══════════════════════════════════════════════════════
//  APPLY CONFIG / THEME
// ══════════════════════════════════════════════════════
function setConfig(name) {
  currentConfig = name;
  localStorage.setItem('articlemd-config', name);

  const theme = THEMES[name];

  // CSS vars on :root
  document.getElementById('theme-style').textContent =
    `:root { ${theme.vars} }\n` + theme.previewCSS;

  // Logo
  document.getElementById('logo-text').innerHTML = theme.logoHTML;

  // Config button active state (desktop)
  ['md','yd','bmcn'].forEach(k => {
    const btn = document.getElementById('cfg-' + k);
    const map = { md: 'markdown', yd: 'yellowdot', bmcn: 'bmcn' };
    btn.classList.toggle('active', map[k] === name);
  });

  // Config button active state (mobile)
  ['md-m','yd-m','bmcn-m'].forEach(k => {
    const btn = document.getElementById('cfg-' + k);
    if (!btn) return;
    const map = { 'md-m': 'markdown', 'yd-m': 'yellowdot', 'bmcn-m': 'bmcn' };
    btn.classList.toggle('active', map[k] === name);
  });

  // Show/hide metadata fields (desktop)
  const isMarkdown = name === 'markdown';
  document.getElementById('field-articlename').classList.toggle('meta-hidden', isMarkdown);
  document.getElementById('field-author').classList.toggle('meta-hidden', isMarkdown);
  document.getElementById('field-publisher').classList.toggle('meta-hidden', isMarkdown);

  // Show/hide metadata fields (mobile drawer)
  document.getElementById('drawer-field-articlename').classList.toggle('meta-hidden', isMarkdown);
  document.getElementById('drawer-field-author').classList.toggle('meta-hidden', isMarkdown);
  document.getElementById('drawer-field-publisher').classList.toggle('meta-hidden', isMarkdown);

  // Status label
  const labels = { markdown: 'Markdown', yellowdot: 'YellowDot', bmcn: 'BMCN' };
  document.getElementById('st-mode').textContent = labels[name];

  // Re-render preview
  editor.dispatchEvent(new Event('input'));
}

// ══════════════════════════════════════════════════════
//  MARKDOWN RENDERER
// ══════════════════════════════════════════════════════
function renderMD(src) {
  let t = src
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');

  const blocks = [];
  t = t.replace(/```(\w*)\n?([\s\S]*?)```/gm, (_, lang, code) => {
    const raw = code.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>');
    blocks.push(`<pre><code>${escHtml(raw)}</code></pre>`);
    return `\x00BLOCK${blocks.length-1}\x00`;
  });

  t = t.replace(/^###### (.+)$/gm,'<h6>$1</h6>');
  t = t.replace(/^##### (.+)$/gm, '<h5>$1</h5>');
  t = t.replace(/^#### (.+)$/gm,  '<h4>$1</h4>');
  t = t.replace(/^### (.+)$/gm,   '<h3>$1</h3>');
  t = t.replace(/^## (.+)$/gm,    '<h2>$1</h2>');
  t = t.replace(/^# (.+)$/gm,     '<h1>$1</h1>');
  t = t.replace(/^(-{3,}|\*{3,}|_{3,})$/gm, '<hr>');
  t = t.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');

  t = t.replace(/^\|(.+)\|\n\|[-| :]+\|\n((?:\|.+\|\n?)+)/gm, (_, hdr, rows) => {
    const ths = hdr.split('|').filter(Boolean).map(c=>`<th>${c.trim()}</th>`).join('');
    const trs = rows.trim().split('\n').map(r => {
      const tds = r.split('|').filter(Boolean).map(c=>`<td>${c.trim()}</td>`).join('');
      return `<tr>${tds}</tr>`;
    }).join('');
    return `<table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>`;
  });

  t = t.replace(/((?:^[\*\-] .+\n?)+)/gm, m => {
    const items = m.trim().split('\n').map(l=>`<li>${l.replace(/^[\*\-] /,'')}</li>`).join('');
    return `<ul>${items}</ul>`;
  });
  t = t.replace(/((?:^\d+\. .+\n?)+)/gm, m => {
    const items = m.trim().split('\n').map(l=>`<li>${l.replace(/^\d+\. /,'')}</li>`).join('');
    return `<ol>${items}</ol>`;
  });

  t = t.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  t = t.replace(/\*\*(.+?)\*\*/g,     '<strong>$1</strong>');
  t = t.replace(/\*(.+?)\*/g,         '<em>$1</em>');
  t = t.replace(/~~(.+?)~~/g,         '<del>$1</del>');
  t = t.replace(/`([^`\x00]+)`/g,     '<code>$1</code>');
  t = t.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img alt="$1" src="$2">');
  t = t.replace(/\[([^\]]+)\]\(([^)]+)\)/g,  '<a href="$2" target="_blank">$1</a>');

  t = t.split(/\n\n+/).map(block => {
    block = block.trim();
    if (!block) return '';
    if (/^(\x00BLOCK|<(h[1-6]|ul|ol|pre|blockquote|hr|table))/.test(block)) return block;
    return `<p>${block.replace(/\n/g,'<br>')}</p>`;
  }).join('\n');

  t = t.replace(/\x00BLOCK(\d+)\x00/g, (_, i) => blocks[+i]);
  return t;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ══════════════════════════════════════════════════════
//  EXPORT CONTENT BUILDER
// ══════════════════════════════════════════════════════
function getExportContent() {
  const body      = editor.value;
  const name      = document.getElementById('articlename').value.trim();
  const author    = document.getElementById('author').value.trim();
  const publisher = document.getElementById('publisher').value.trim();

  if (currentConfig === 'markdown') return body;

  // Build header/footer lines
  const lines = [];

  // @n= tag
  if (name) lines.push(`@n="${name}"`);

  // Author h6 at top
  if (author) lines.push(`###### Written by ${author}`);

  let content = lines.join('\n');
  if (content) content += '\n\n';
  content += body;

  // Footer attribution
  if (author) {
    const date = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    const pub  = publisher && publisher !== author ? publisher : null;
    const footer = pub
      ? `\n\n**Written by ${author}** and published by ${pub} on ${date}`
      : `\n\n**Written and Published by ${author}** on ${date}`;
    content += footer;
  }

  return content;
}

// ══════════════════════════════════════════════════════
//  LIVE PREVIEW — strip metadata lines before rendering
// ══════════════════════════════════════════════════════
editor.addEventListener('input', () => {
  let src = editor.value;
  preview.innerHTML = renderMD(src);
  updateStats();
});

function updateStats() {
  const v = editor.value;
  const w = v.trim() ? v.trim().split(/\s+/).length : 0;
  document.getElementById('st-words').textContent = w;
  document.getElementById('st-chars').textContent = v.length;
  document.getElementById('st-lines').textContent = v.split('\n').length;
  document.getElementById('st-read').textContent  = Math.max(1, Math.round(w/200)) + ' min';
}

// ══════════════════════════════════════════════════════
//  FORMAT HELPERS
// ══════════════════════════════════════════════════════
function fmt(type) {
  const s = editor.selectionStart, e = editor.selectionEnd;
  const sel  = editor.value.substring(s, e);
  const pre  = editor.value.substring(0, s);
  const post = editor.value.substring(e);

  const wrap = (l, r) => {
    editor.value = pre + l + sel + r + post;
    editor.setSelectionRange(s + l.length, e + l.length);
  };
  const linePrefix = (p) => {
    const ls = pre.lastIndexOf('\n') + 1;
    editor.value = editor.value.substring(0, ls) + p + editor.value.substring(ls);
    editor.setSelectionRange(s + p.length, e + p.length);
  };
  const insert = (text, cur) => {
    editor.value = pre + text + post;
    editor.setSelectionRange(s + cur, s + cur);
  };

  switch(type) {
    case 'bold':       wrap('**','**'); break;
    case 'italic':     wrap('*','*'); break;
    case 'strike':     wrap('~~','~~'); break;
    case 'code':       wrap('`','`'); break;
    case 'h1':         linePrefix('# '); break;
    case 'h2':         linePrefix('## '); break;
    case 'h3':         linePrefix('### '); break;
    case 'ul':         linePrefix('- '); break;
    case 'ol':         linePrefix('1. '); break;
    case 'blockquote': linePrefix('> '); break;
    case 'hr':         insert('\n\n---\n\n', 6); break;
    case 'link':       wrap('[','](url)'); break;
    case 'image':      wrap('![','](url)'); break;
    case 'codeblock':  wrap('```\n','\n```'); break;
    case 'table': {
      const tbl = '\n| Column 1 | Column 2 | Column 3 |\n| --- | --- | --- |\n| Cell | Cell | Cell |\n';
      insert(tbl, tbl.length); break;
    }
  }
  editor.focus();
  editor.dispatchEvent(new Event('input'));
}

// ══════════════════════════════════════════════════════
//  VIEW MODES
// ══════════════════════════════════════════════════════
function setView(mode) {
  document.getElementById('pane-edit').classList.toggle('hidden', mode === 'preview');
  document.getElementById('pane-preview').classList.toggle('hidden', mode === 'edit');
  ['split','edit','preview'].forEach(v =>
    document.getElementById('vb-'+v).classList.toggle('active', v === mode));
}

// ══════════════════════════════════════════════════════
//  FILE ACTIONS
// ══════════════════════════════════════════════════════
function newFile() {
  if (editor.value && !confirm('Discard current content?')) return;
  editor.value = '';
  document.getElementById('filename').value    = 'untitled.md';
  document.getElementById('filename-m').value  = 'untitled.md';
  document.getElementById('articlename').value = '';
  document.getElementById('articlename-m').value = '';
  document.getElementById('author').value      = '';
  document.getElementById('author-m').value    = '';
  document.getElementById('publisher').value   = '';
  document.getElementById('publisher-m').value = '';
  preview.innerHTML = '';
  updateStats();
}

function uploadFile(evt) {
  const file = evt.target.files[0];
  if (!file) return;
  const r = new FileReader();
  r.onload = ev => {
    let content = ev.target.result;

    // Extract @n=
    const nameMatch = content.match(/^@n="([^\n"]*)"\n?/);
    if (nameMatch) {
      document.getElementById('articlename').value   = nameMatch[1];
      document.getElementById('articlename-m').value = nameMatch[1];
      content = content.slice(nameMatch[0].length);
    } else {
      document.getElementById('articlename').value   = '';
      document.getElementById('articlename-m').value = '';
    }

    const authorMatch = content.match(/^###### Written by (.+)\n?/m);
    if (authorMatch) {
      document.getElementById('author').value   = authorMatch[1].trim();
      document.getElementById('author-m').value = authorMatch[1].trim();
      content = content.replace(authorMatch[0], '');
    } else {
      document.getElementById('author').value   = '';
      document.getElementById('author-m').value = '';
    }

    content = content.replace(/\n\n\*\*Written.*?on .+$/s, '').trimEnd();

    editor.value = content;
    document.getElementById('filename').value   = file.name;
    document.getElementById('filename-m').value = file.name;
    editor.dispatchEvent(new Event('input'));
  };
  r.readAsText(file);
  evt.target.value = '';
}

function saveFile() {
  const name = document.getElementById('filename').value || 'article.md';
  const blob = new Blob([getExportContent()], { type: 'text/markdown' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name;
  a.click();
  toast('Saved — ' + name);
}

function copyClipboard() {
  navigator.clipboard.writeText(getExportContent()).then(() => toast('Copied to clipboard'));
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

// ══════════════════════════════════════════════════════
//  MOBILE DRAWER
// ══════════════════════════════════════════════════════
function toggleDrawer() {
  const d = document.getElementById('mobile-drawer');
  d.classList.toggle('open');
}
function closeDrawer() {
  document.getElementById('mobile-drawer').classList.remove('open');
}
// Close drawer if tapping outside
document.addEventListener('click', e => {
  const drawer = document.getElementById('mobile-drawer');
  const btn    = document.getElementById('hamburger-btn');
  if (drawer.classList.contains('open') && !drawer.contains(e.target) && !btn.contains(e.target)) {
    drawer.classList.remove('open');
  }
});

// ── MIRROR FIELDS (desktop ↔ mobile) ──
// Each mobile input mirrors its desktop counterpart and vice versa
const mirrorPairs = [
  ['articlename', 'articlename-m'],
  ['author',      'author-m'],
  ['publisher',   'publisher-m'],
  ['filename',    'filename-m'],
];
mirrorPairs.forEach(([desktopId, mobileId]) => {
  const desk = document.getElementById(desktopId);
  const mob  = document.getElementById(mobileId);
  if (!desk || !mob) return;
  desk.addEventListener('input', () => { mob.value = desk.value; });
  mob.addEventListener('input',  () => { desk.value = mob.value; desk.dispatchEvent(new Event('input')); });
});

// Sync mobile active state when setConfig is called (patch in)
const _origSetConfig = setConfig;
// already handled below — mobile buttons call setConfig directly
['articlename','author','publisher','filename'].forEach(id => {
  const el = document.getElementById(id);
  const elM = document.getElementById(id + '-m');
  const stored = localStorage.getItem('articlemd-' + id);
  if (stored) {
    el.value = stored;
    if (elM) elM.value = stored;
  }
  el.addEventListener('input', () => localStorage.setItem('articlemd-' + id, el.value));
  if (elM) elM.addEventListener('input', () => localStorage.setItem('articlemd-' + id, elM.value));
});

// Tab key
editor.addEventListener('keydown', e => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const s = editor.selectionStart;
    editor.value = editor.value.substring(0, s) + '  ' + editor.value.substring(s);
    editor.selectionStart = editor.selectionEnd = s + 2;
  }
});

// ══════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════
setConfig(currentConfig);
updateStats();
